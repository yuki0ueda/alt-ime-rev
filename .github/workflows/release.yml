name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  AHK_VERSION: '2.0.23'
  AHK2EXE_VERSION: '1.1.37.02a2'
  MAIN_SCRIPT: 'src/alt-ime-rev.ahk'
  OUTPUT_BASENAME: 'alt-ime-rev'

# AutoHotkey v2 の公式配布は x86 (AutoHotkey32.exe) / x64 (AutoHotkey64.exe) のみで、
# ARM64 ネイティブ base ファイルは存在しない。よって配布バイナリは x64 単一ビルド。
# Windows 11 on ARM マシンは Microsoft Prism エミュレーション経由で x64 .exe を実行する。
# alt-ime-rev はホットキーユーティリティで API 呼び出しが軽量なため、Prism のオーバーヘッドは実用上問題ない。

jobs:
  build:
    name: Build .exe (x64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up AutoHotkey ${{ env.AHK_VERSION }} + Ahk2Exe ${{ env.AHK2EXE_VERSION }}
        shell: pwsh
        run: |
          $ahkVer     = "${{ env.AHK_VERSION }}"
          $ahk2exeVer = "${{ env.AHK2EXE_VERSION }}"

          # Notes on the layout:
          # - AutoHotkey base runtimes ship in AutoHotkey_<ver>.zip from
          #   AutoHotkey/AutoHotkey on github.com (the autohotkey.com download
          #   is gated by a Cloudflare bot challenge and is unusable from CI).
          # - Ahk2Exe is a separate official compiler from AutoHotkey/Ahk2Exe;
          #   its zip contains only Ahk2Exe.exe.
          # - Ahk2Exe expects to be invoked from a "Compiler" subfolder of an
          #   AutoHotkey install so it can locate base runtimes via the parent
          #   directory. We replicate that layout below: ahk\AutoHotkey64.exe
          #   as the base runtime and ahk\Compiler\Ahk2Exe.exe as the compiler.
          # - The Compile step also passes /base explicitly, but the Compiler\
          #   sub-folder layout is what lets Ahk2Exe initialise correctly
          #   (without it Ahk2Exe.exe exits non-zero with no useful stderr).

          # 1. Download and extract AutoHotkey base runtimes into ahk\
          $ahkUrl = "https://github.com/AutoHotkey/AutoHotkey/releases/download/v${ahkVer}/AutoHotkey_${ahkVer}.zip"
          Write-Host "Downloading $ahkUrl"
          Invoke-WebRequest -Uri $ahkUrl -OutFile ahk.zip -UseBasicParsing
          New-Item -ItemType Directory -Force -Path ahk | Out-Null
          Expand-Archive -Path ahk.zip -DestinationPath ahk -Force

          # 2. Download Ahk2Exe and extract into ahk\Compiler\
          $ahk2exeUrl = "https://github.com/AutoHotkey/Ahk2Exe/releases/download/Ahk2Exe${ahk2exeVer}/Ahk2Exe${ahk2exeVer}.zip"
          Write-Host "Downloading $ahk2exeUrl"
          Invoke-WebRequest -Uri $ahk2exeUrl -OutFile ahk2exe.zip -UseBasicParsing
          New-Item -ItemType Directory -Force -Path ahk\Compiler | Out-Null
          Expand-Archive -Path ahk2exe.zip -DestinationPath ahk\Compiler -Force

          Write-Host "--- AutoHotkey + Ahk2Exe layout ---"
          Get-ChildItem -Path ahk -Recurse -Filter "*.exe" |
            Select-Object FullName | Format-Table -AutoSize

      - name: Locate Ahk2Exe and x64 base
        id: locate
        shell: pwsh
        run: |
          $ahk2exe = Get-ChildItem -Path "ahk\Compiler" -Recurse -Filter "Ahk2Exe.exe" |
                     Select-Object -First 1 -ExpandProperty FullName
          if (-not $ahk2exe) { throw "Ahk2Exe.exe not found in ahk\Compiler" }

          $base = Get-ChildItem -Path "ahk" -Recurse -Filter "AutoHotkey64.exe" |
                  Select-Object -First 1 -ExpandProperty FullName
          if (-not $base) { throw "AutoHotkey64.exe (x64 base file) not found in ahk\" }

          Write-Host "Ahk2Exe : $ahk2exe"
          Write-Host "Base    : $base"
          "ahk2exe=$ahk2exe" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "base=$base"       | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Compile ${{ env.MAIN_SCRIPT }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          # Use absolute paths for /in and /out: Ahk2Exe resolves relative
          # /out paths against the parent directory of /in (so e.g.
          # "dist/foo.exe" with /in "src/foo.ahk" lands in "src/dist/foo.exe",
          # which doesn't exist and fails with
          # "Ahk2Exe Error: Could not move final compiled binary file to
          # destination. (C1)").
          $srcAbs = (Resolve-Path "${{ env.MAIN_SCRIPT }}").Path
          $outAbs = Join-Path (Get-Location) "dist\${{ env.OUTPUT_BASENAME }}-x64.exe"
          # Run Ahk2Exe via Start-Process -Wait so PowerShell actually waits
          # for the compiler to exit. Ahk2Exe is a Windows GUI subsystem
          # binary; PowerShell's `&` invocation operator launches it
          # asynchronously and returns immediately, so $LASTEXITCODE ends up
          # empty even when the compile succeeds. Start-Process -Wait keeps
          # the script blocked on the GUI process and gives us a real exit
          # code via -PassThru.
          # /silent verbose : Ahk2Exe-side flag to skip the GUI window and
          # stream progress to stdout (CCCC-L/Action-Ahk2Exe and
          # tamo/action-Ahk2Exe both use the same flags).
          $proc = Start-Process -FilePath "${{ steps.locate.outputs.ahk2exe }}" `
              -ArgumentList "/silent","verbose",`
                  "/in", $srcAbs,`
                  "/out", $outAbs,`
                  "/base", "${{ steps.locate.outputs.base }}" `
              -Wait -PassThru -NoNewWindow
          if ($proc.ExitCode -ne 0) {
              throw "Ahk2Exe failed with exit $($proc.ExitCode)"
          }
          if (-not (Test-Path $outAbs)) { throw "Expected output not found: $outAbs" }
          Write-Host "Built: $outAbs ($([math]::Round((Get-Item $outAbs).Length/1KB, 1)) KB)"

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe-x64
          path: dist/${{ env.OUTPUT_BASENAME }}-x64.exe
          if-no-files-found: error

  package-source:
    name: Package source zip
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version label
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            ver="${GITHUB_REF#refs/tags/}"
          else
            ver="dev-${GITHUB_SHA::7}"
          fi
          echo "ver=$ver" >> "$GITHUB_OUTPUT"
          echo "Version label: $ver"

      - name: Build source zip
        shell: bash
        run: |
          set -euo pipefail
          name="${{ env.OUTPUT_BASENAME }}-src-${{ steps.ver.outputs.ver }}"
          mkdir -p "dist/$name"
          cp -r src      "dist/$name/"
          cp -r docs     "dist/$name/"
          cp README.md CHANGELOG.md LICENSE "dist/$name/"
          (cd dist && zip -r "$name.zip" "$name")
          ls -la dist/

      - name: Upload source zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-zip
          path: dist/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build, package-source]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for CHANGELOG)
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Flatten assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find artifacts -type f \( -name '*.exe' -o -name '*.zip' \) -exec cp -v {} release-assets/ \;
          ls -la release-assets/

      - name: Extract release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          # Match "## [v1.0.0]" with bracket anchors so e.g. a "v1.0" tag does not
          # accidentally match "## [v1.0.0]" via substring containment.
          awk -v tag="$tag" '
            BEGIN { found=0 }
            /^## / {
              if (found) { exit }
              if ($0 ~ "\\[" tag "\\]") { found=1; next }
            }
            found { print }
          ' CHANGELOG.md > release_notes.md
          if [[ ! -s release_notes.md ]]; then
            echo "No CHANGELOG section for $tag, using generic note." >&2
            printf '%s\n' "Release $tag" > release_notes.md
          fi
          echo "--- release_notes.md ---"
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          files: release-assets/*
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
